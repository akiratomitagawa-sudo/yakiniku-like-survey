services:
  - type: web
    name: yakiniku-like-survey
    runtime: node
    plan: starter
    buildCommand: "true"
    startCommand: "node server.js"
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SURVEY_PUBLIC_BASE_URL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATA_DIR
        value: /var/data
    disk:
      name: survey-data
      mountPath: /var/data
      sizeGB: 1

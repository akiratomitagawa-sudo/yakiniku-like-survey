services:
  - type: web
    name: yakiniku-like-survey
    runtime: node
    plan: free
    buildCommand: "true"
    startCommand: "node server.js"
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SURVEY_PUBLIC_BASE_URL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_TABLE
        value: survey_responses
